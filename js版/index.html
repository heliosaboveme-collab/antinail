<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Blackjack UI - Java Logic Edition</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #2c3e50; color: white; }
        .game-area { background-color: #27ae60; padding: 20px; border-radius: 15px; width: 400px; margin: 0 auto; border: 5px solid #d4af37; }
        .hand { font-size: 24px; margin: 10px; min-height: 40px; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; }
        #peek-btn { background-color: #9b59b6; color: white; }
    </style>
</head>
<body>
    <h1>Blackjack - Skill Edition</h1>
    <div class="game-area">
        <p>ディーラーの合計: <span id="dealer-score">?</span></p>
        <div id="dealer-hand" class="hand"></div>
        <hr>
        <div id="player-hand" class="hand"></div>
        <p>あなたの合計: <span id="player-score">0</span></p>
        
        <button onclick="hit()">ヒット</button>
        <button onclick="stand()">スタンド</button>
        <button id="peek-btn" onclick="peek()">スキル(透視)</button>
        <br>
        <button onclick="location.reload()" style="margin-top:20px; background:#444; color:white;">もう一度遊ぶ</button>
    </div>

    <script src="Card.js"></script>
    <script src="Deck.js"></script>
    <script src="Player.js"></script>
    <script src="main.js"></script>
</body>
</html>
